name: Auto Update M3U Playlist

on:
  schedule:
    - cron: '0 2 * * *' # S'exécute automatiquement toutes les nuits à 2h du matin
  workflow_dispatch: # Permet de lancer la mise à jour manuellement quand tu veux

permissions:
  contents: write

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code du dépôt
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Exécuter le script de tri
        run: python script.py

      - name: Enregistrer les modifications sur GitHub
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add playlist.m3u
          git commit -m "Mise à jour automatique des chaînes" || echo "Aucun changement détecté"
          git push
